name: pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: prepare static site
        run: |
          mkdir _site
          cp -R index.html ASSET-LICENSE.md LICENSE README.md data docs media src _site/
      - name: setup pages
        uses: actions/configure-pages@v5
      - name: upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: deploy
        id: deployment
        uses: actions/deploy-pages@v4
